<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Note-Taker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1>🎙️ Live Transcription and Summarization</h1>
      <span class="subtitle">Live transcription with speaker diarization — no audio recording</span>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <main class="main">
    <div class="controls">
      <button id="startBtn" onclick="startMeeting()">▶ Start Meeting</button>
      <button id="endBtn" onclick="endMeeting()" disabled>⏹ End Meeting</button>
      <button id="exportBtn" onclick="exportNotes()" style="display:none">📥 Export Notes</button>
      <button id="exportTranscriptBtn" onclick="exportTranscript()" style="display:none">📄 Export Transcript</button>
      <button id="clearBtn" onclick="clearSession()" style="display:none">🗑️ Clear Session</button>
    </div>

    <div id="error" class="error"></div>

    <div class="dashboard">
      <div class="card card--keypoints">
        <h2><span class="icon">📌</span> Key Points</h2>
        <ul id="keyPoints"><li class="empty-state">Waiting for meeting to start...</li></ul>
      </div>
      <div class="card card--decisions">
        <h2><span class="icon">✅</span> Decisions</h2>
        <ul id="decisions"><li class="empty-state">Waiting for meeting to start...</li></ul>
      </div>
      <div class="card card--actions">
        <h2><span class="icon">📋</span> Action Items</h2>
        <ul id="actionItems"><li class="empty-state">Waiting for meeting to start...</li></ul>
      </div>
    </div>

    <div class="transcript-bar">
      <div class="label">Live Transcript</div>
      <div id="liveTranscript">—</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
